<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Restricted</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Segoe UI", Arial, sans-serif; background-color: #f4f4f4; color: #2c2c2c; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: #ffffff; border-bottom: 3px solid #f5a623; padding: 18px 40px; display: flex; align-items: center; }
        header img { height: 60px; width: auto; }
        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 20px; }
        .card { background-color: #ffffff; border-radius: 6px; border-top: 4px solid #f5a623; box-shadow: 0 2px 12px rgba(0,0,0,0.08); max-width: 600px; width: 100%; padding: 48px 48px 40px; text-align: center; }
        .icon { width: 56px; height: 56px; background-color: #fff4e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
        .icon svg { width: 28px; height: 28px; fill: #f5a623; }
        h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 14px; }
        p { font-size: 15px; line-height: 1.7; color: #555555; margin-bottom: 10px; }
        .divider { border: none; border-top: 1px solid #e8e8e8; margin: 28px 0; }
        .ray-box { background-color: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 4px; padding: 14px 20px; text-align: left; }
        .ray-box p { font-size: 13px; color: #888888; margin-bottom: 4px; }
        .ray-box code { font-family: "Courier New", monospace; font-size: 14px; color: #2c2c2c; font-weight: 600; word-break: break-all; }
        footer { text-align: center; padding: 18px 20px; font-size: 12px; color: #aaaaaa; background-color: #ffffff; border-top: 1px solid #e8e8e8; }
    </style>
